/* ----------------------------------------------------------------
   GOOGLE SHEETS 연동 유틸 (SheetDB.io 사용)
   - sheetdb.io 에서 구글시트를 연결하면 CORS가 기본 지원되는 REST API 주소가 발급됩니다.
   - Apps Script 배포, 권한 설정, 프록시 서버 등이 전혀 필요 없고, 어떤 기기/브라우저에서도
     동일하게 동작합니다 (별도의 리다이렉트가 없어서 발생하던 CORS 문제 자체가 없습니다).
   - 시트의 첫 행(헤더)은 아래 이름 그대로여야 합니다:
     id, code, name, category, film, condition, donor, caption,
     gradient1, gradient2, isPriority, reservedBy, imageUrl, videoUrl
------------------------------------------------------------------- */
const SHEET_TAB_NAME = 'Props'; // 구글시트의 탭(시트) 이름

function sheetRowToProp_(row) {
  const orNull = (v) => (v === undefined || v === null || v === '' ? null : v);
  let priorityStartDate = null, priorityEndDate = null;
  if (row.priorityDate) {
    const parts = String(row.priorityDate).split('~');
    priorityStartDate = parts[0] || null;
    priorityEndDate = parts[1] || parts[0] || null;
  }
  // generalRentedBy 컬럼 하나에 "이름||시작일~종료일" 형태로 합쳐서 저장 (새 컬럼 추가 없이 재사용)
  let generalRentedBy = null, generalStartDate = null, generalEndDate = null;
  if (row.generalRentedBy) {
    const [namePart, datePart] = String(row.generalRentedBy).split('||');
    generalRentedBy = namePart || null;
    if (datePart) {
      const parts = datePart.split('~');
      generalStartDate = parts[0] || null;
      generalEndDate = parts[1] || parts[0] || null;
    }
  }
  return {
    id: row.id,
    code: row.code,
    name: row.name,
    category: row.category,
    film: row.film,
    condition: row.condition,
    donor: row.donor,
    caption: row.caption,
    gradient: [row.gradient1 || '#3a352f', row.gradient2 || '#6b625a'],
    priorityReservedBy: orNull(row.reservedBy),
    priorityStartDate,
    priorityEndDate,
    generalRentedBy,
    generalStartDate,
    generalEndDate,
    imageUrl: orNull(row.imageUrl),
    videoUrl: orNull(row.videoUrl),
  };
}

function propToSheetRow_(prop) {
  const g = prop.gradient || ['#3a352f', '#6b625a'];
  const priorityDate = prop.priorityStartDate
    ? (prop.priorityEndDate && prop.priorityEndDate !== prop.priorityStartDate
        ? `${prop.priorityStartDate}~${prop.priorityEndDate}`
        : prop.priorityStartDate)
    : '';
  let generalRentedByCell = '';
  if (prop.generalRentedBy) {
    generalRentedByCell = prop.generalRentedBy;
    if (prop.generalStartDate) {
      const range = prop.generalEndDate && prop.generalEndDate !== prop.generalStartDate
        ? `${prop.generalStartDate}~${prop.generalEndDate}`
        : prop.generalStartDate;
      generalRentedByCell += `||${range}`;
    }
  }
  return {
    id: String(prop.id),
    code: prop.code || '',
    name: prop.name || '',
    category: prop.category || '',
    film: prop.film || '',
    condition: prop.condition || '',
    donor: prop.donor || '',
    caption: prop.caption || '',
    gradient1: g[0],
    gradient2: g[1],
    isPriority: prop.priorityReservedBy ? 'TRUE' : 'FALSE',
    reservedBy: prop.priorityReservedBy || '',
    priorityDate,
    generalRentedBy: generalRentedByCell,
    imageUrl: prop.imageUrl || '',
    videoUrl: prop.videoUrl || '',
  };
}

async function sheetGetAll(apiUrl) {
  if (!apiUrl) throw new Error('시트 API 주소가 설정되지 않았습니다.');
  const res = await fetch(`${apiUrl}?sheet=${encodeURIComponent(SHEET_TAB_NAME)}`);
  if (!res.ok) throw new Error(`시트 불러오기 실패 (HTTP ${res.status})`);
  const rows = await res.json();
  if (!Array.isArray(rows)) throw new Error('시트 응답 형식이 올바르지 않습니다.');
  return rows.filter(r => r.id).map(sheetRowToProp_);
}

async function sheetAddOrUpdate(apiUrl, prop) {
  if (!apiUrl) throw new Error('시트 API 주소가 설정되지 않았습니다.');
  const row = propToSheetRow_(prop);

  // 이미 같은 id가 있으면 수정(PATCH), 없으면 새로 추가(POST)
  const patchRes = await fetch(
    `${apiUrl}/id/${encodeURIComponent(row.id)}?sheet=${encodeURIComponent(SHEET_TAB_NAME)}`,
    { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ data: row }) }
  );
  if (patchRes.ok) {
    const patchData = await patchRes.json().catch(() => null);
    if (patchData && patchData.updated > 0) return { ok: true };
  }

  const postRes = await fetch(`${apiUrl}?sheet=${encodeURIComponent(SHEET_TAB_NAME)}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ data: [row] }),
  });
  if (!postRes.ok) throw new Error(`시트 저장 실패 (HTTP ${postRes.status})`);
  return { ok: true };
}

async function sheetExportAll(apiUrl, propsList) {
  if (!apiUrl) throw new Error('시트 API 주소가 설정되지 않았습니다.');
  // 행 삭제 없이, 목록에 있는 항목을 하나씩 있으면 수정/없으면 추가 (데이터 유실 위험 없음)
  for (const prop of propsList) {
    await sheetAddOrUpdate(apiUrl, prop);
  }
  return { ok: true };
}

/* ----------------------------------------------------------------
   TOAST — 대여 차단/성공 알림
------------------------------------------------------------------- */
function Toast({ toast }) {
  if (!toast) return null;
  const tone = toast.type === 'block'
    ? 'bg-rust/95 border-rust'
    : 'bg-olive/95 border-olive';
  return (
    <div className={`fixed bottom-24 sm:bottom-8 left-1/2 toast-anim z-50 px-5 py-3 rounded-lg border ${tone} shadow-xl max-w-sm text-center`}>
      <p className="text-sm font-semibold text-ink">{toast.message}</p>
    </div>
  );
}

const MIN_RESERVE_LEAD_DAYS = 10;

/** 오늘로부터 최소 며칠 후부터 우선예약 촬영일로 선택 가능한지 계산 (YYYY-MM-DD) */
function getMinReservationDate_() {
  const d = new Date();
  d.setDate(d.getDate() + MIN_RESERVE_LEAD_DAYS);
  return d.toISOString().slice(0, 10);
}

/* ----------------------------------------------------------------
   인벤토리 태그 카드 (카탈로그 화면의 시그니처 컴포넌트)
------------------------------------------------------------------- */
function PropTag({ prop, onReserve, onCancelReserve }) {
  const reserved = !!prop.priorityReservedBy;
  const [pickingDate, setPickingDate] = useState(false);
  const minDate = useMemo(() => getMinReservationDate_(), []);
  const [startDate, setStartDate] = useState(minDate);
  const [endDate, setEndDate] = useState(minDate);

  const handleStartChange = (e) => {
    const v = e.target.value;
    setStartDate(v);
    if (endDate < v) setEndDate(v); // 종료일이 시작일보다 앞서지 않도록 자동 보정
  };

  const handleConfirm = () => {
    if (!startDate || startDate < minDate) {
      alert(`우선 예약은 최소 ${MIN_RESERVE_LEAD_DAYS}일 전에 신청해야 합니다. 시작일을 다시 선택해주세요.`);
      return;
    }
    if (!endDate || endDate < startDate) {
      alert('종료일은 시작일보다 빠를 수 없습니다.');
      return;
    }
    onReserve(prop.id, startDate, endDate);
    setPickingDate(false);
  };

  return (
    <div className={`relative rounded-md bg-surface border ${reserved ? 'border-rust/60' : 'border-white/10'} overflow-hidden flex flex-col shadow-lg`}>

      {/* 펀치홀 + 코드 라벨 */}
      <div className="flex items-center justify-between px-3 pt-3">
        <div className="tag-hole"></div>
        <span className="font-mono text-[11px] tracking-widest text-muted">{prop.code}</span>
      </div>

      {/* 사진 영역: 업로드된 이미지가 있으면 표시, 없으면 플레이스홀더 그라디언트 */}
      <div
        className="relative mt-2 mx-3 h-36 rounded overflow-hidden flex items-end"
        style={!prop.imageUrl ? { backgroundImage: `linear-gradient(155deg, ${(prop.gradient || ['#3a352f','#6b625a'])[0]}, ${(prop.gradient || ['#3a352f','#6b625a'])[1]})` } : undefined}
      >
        {prop.imageUrl && (
          <img src={prop.imageUrl} alt={prop.name} className="absolute inset-0 w-full h-full object-cover" />
        )}
        <span className="relative text-[10px] font-mono text-ink/70 bg-black/30 px-2 py-0.5 m-2 rounded">{prop.category}</span>

        {reserved && (
          <div className="absolute inset-0 flex items-center justify-center bg-stage/40">
            <div className="stamp px-3 py-1 text-xs font-bold uppercase bg-stage/70 rounded">
              예약 완료
            </div>
          </div>
        )}
      </div>

      {/* 정보 */}

/** 유튜브 링크(watch/youtu.be/shorts 등)를 감지해서 임베드 가능한 URL로 변환. 유튜브가 아니면 null 반환 */
function getYoutubeEmbedUrl_(url) {
  if (!url) return null;
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtube\.com\/shorts\/|youtu\.be\/|youtube\.com\/embed\/)([\w-]{11})/,
  ];
  for (const re of patterns) {
    const m = url.match(re);
    if (m) return `https://www.youtube.com/embed/${m[1]}?autoplay=1&mute=1&loop=1&playlist=${m[1]}&playsinline=1&controls=0`;
  }
  return null;
}

/** 구글 드라이브 공유 링크를 감지해서 임베드 가능한 미리보기 URL로 변환. 드라이브 링크가 아니면 null 반환.
 *  ⚠ 파일 공유 설정이 "링크가 있는 모든 사용자(뷰어)"로 되어 있어야 다른 사람도 재생할 수 있습니다. */
function getGoogleDriveEmbedUrl_(url) {
  if (!url) return null;
  const m = url.match(/drive\.google\.com\/file\/d\/([\w-]+)/) || url.match(/[?&]id=([\w-]+)/);
  if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
  return null;
}

/* ----------------------------------------------------------------
   화면 2: 숏폼 피드 (일반 사용자)
------------------------------------------------------------------- */
function FeedSlide({ prop, interaction, onLike, onSave, onShare, onRent, onCancelRent }) {
  const youtubeEmbedUrl = getYoutubeEmbedUrl_(prop.videoUrl);
  const driveEmbedUrl = !youtubeEmbedUrl ? getGoogleDriveEmbedUrl_(prop.videoUrl) : null;
  const isPlainVideo = !youtubeEmbedUrl && !driveEmbedUrl && !!prop.videoUrl;
  const videoRef = useRef(null);
  const slideRef = useRef(null);

  const [pickingRentDate, setPickingRentDate] = useState(false);
  const todayStr = useMemo(() => new Date().toISOString().slice(0, 10), []);
  const [rentStart, setRentStart] = useState(todayStr);
  const [rentEnd, setRentEnd] = useState(todayStr);

  const handleRentStartChange = (e) => {
    const v = e.target.value;
    setRentStart(v);
    if (rentEnd < v) setRentEnd(v); // 종료일이 시작일보다 앞서지 않도록 자동 보정
  };

  const handleConfirmRent = () => {
    if (!rentStart) { alert('대여 시작일을 선택해주세요.'); return; }
    if (!rentEnd || rentEnd < rentStart) { alert('종료일은 시작일보다 빠를 수 없습니다.'); return; }
    onRent(prop, rentStart, rentEnd);
    setPickingRentDate(false);
  };

  // 숏폼처럼: 이 영상이 화면(스크롤 컨테이너) 안에 충분히 보일 때만 재생하고,
  // 스크롤해서 벗어나면 자동으로 멈춥니다.
  useEffect(() => {
    if (!isPlainVideo || !videoRef.current || !slideRef.current) return;
    const scrollRoot = slideRef.current.closest('.feed-scroll');
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          const video = videoRef.current;
          if (!video) return;
          if (entry.isIntersecting) {
            video.play().catch(() => {});
          } else {
            video.pause();
          }
        });
      },
      { root: scrollRoot || null, threshold: 0.6 }
    );
    observer.observe(slideRef.current);
    return () => observer.disconnect();
  }, [isPlainVideo, prop.videoUrl]);

  return (
    <div ref={slideRef} className="feed-slide relative h-full w-full shrink-0 flex items-end justify-start"
      style={!prop.videoUrl && !prop.imageUrl ? { backgroundImage: `linear-gradient(200deg, ${(prop.gradient || ['#3a352f','#6b625a'])[0]}, ${(prop.gradient || ['#3a352f','#6b625a'])[1]})` } : undefined}
    >
      {/* 유튜브/구글드라이브 링크면 iframe 임베드, 그 외 mp4 등 직접 영상 링크면 video 태그,
          영상이 없고 이미지만 있으면 이미지, 아무것도 없으면 그라디언트 플레이스홀더 */}
      {youtubeEmbedUrl ? (
        <iframe
          className="absolute inset-0 w-full h-full pointer-events-none"
          src={youtubeEmbedUrl}
          allow="autoplay; encrypted-media"
          frameBorder="0"
        />
      ) : driveEmbedUrl ? (
        <iframe
          className="absolute inset-0 w-full h-full"
          src={driveEmbedUrl}
          allow="autoplay"
          frameBorder="0"
        />
      ) : prop.videoUrl ? (
        <video
          ref={videoRef}
          className="absolute inset-0 w-full h-full object-cover"
          src={prop.videoUrl}
          loop
          muted
          playsInline
        />
      ) : prop.imageUrl ? (
        <img src={prop.imageUrl} alt={prop.name} className="absolute inset-0 w-full h-full object-cover" />
      ) : null}

      {/* 하단 가독성용 그라디언트 */}
      <div className="absolute inset-0 bg-gradient-to-t from-stage/90 via-stage/10 to-transparent"></div>

      {/* 우선예약 뱃지 (정보 표시용 — 일반 사용자의 대여 자체를 막지는 않아요) */}
      {prop.priorityReservedBy && (
        <div className="absolute top-4 left-4 stamp px-2 py-0.5 text-[10px] font-bold bg-stage/70 rounded">
          촬영 대여중{prop.priorityStartDate && ` · ${prop.priorityStartDate}${prop.priorityEndDate && prop.priorityEndDate !== prop.priorityStartDate ? ` ~ ${prop.priorityEndDate}` : ''}`}
        </div>
      )}
      <div className="absolute top-4 right-4 font-mono text-[10px] text-ink/60">{prop.code}</div>

      {/* 우측 하단 인터랙션 스택 */}
      <div className="absolute right-3 bottom-28 sm:bottom-24 flex flex-col items-center gap-5 z-10">
        <button onClick={() => onLike(prop.id)} className="flex flex-col items-center gap-1 active:scale-90 transition">
          <Icon.Heart filled={interaction.liked} />
          <span className="text-[11px] font-mono">{interaction.likeCount}</span>

        <button onClick={() => onSave(prop.id)} className="flex flex-col items-center gap-1 active:scale-90 transition">
          <Icon.Bookmark filled={interaction.saved} />

        <button onClick={() => onShare(prop.id)} className="flex flex-col items-center gap-1 active:scale-90 transition">

      </div>

      {/* 좌하단 캡션 + 대여 버튼 */}
      <div className="relative z-10 px-5 pb-8 pr-20 w-full">
        <p className="text-xs text-amber font-mono tracking-wide mb-1">{prop.category} · {prop.film}</p>
        <h3 className="font-display text-3xl tracking-wide">{prop.name}</h3>
        <p className="text-sm text-ink/80 mt-1 max-w-md">{prop.caption}</p>

        {prop.generalRentedBy ? (
          <div className="flex items-center gap-2 mt-4 flex-wrap">
            <span className="px-5 py-2.5 rounded-full text-sm font-bold bg-white/10 text-ink border border-white/20">
              대여중{prop.generalStartDate && ` · ${prop.generalStartDate}${prop.generalEndDate && prop.generalEndDate !== prop.generalStartDate ? ` ~ ${prop.generalEndDate}` : ''}`}
            </span>
            <button
              onClick={() => onCancelRent(prop.id)}
              className="px-5 py-2.5 rounded-full text-sm font-bold bg-white/5 text-muted border border-white/20 hover:text-ink hover:border-white/40 transition active:scale-95"
            >
              대여 취소
            </button>
          </div>
        ) : pickingRentDate ? (
          <div className="mt-4 bg-stage/80 backdrop-blur rounded-xl p-4 flex flex-col gap-2 max-w-xs border border-white/10">
            <label className="text-[11px] text-muted font-mono">대여 시작일</label>
            <input
              type="date"
              min={todayStr}
              value={rentStart}
              onChange={handleRentStartChange}
              className="w-full bg-black/30 border border-white/10 rounded px-2 py-1.5 text-xs text-ink"
            />
            <label className="text-[11px] text-muted font-mono mt-1">대여 종료일</label>
            <input
              type="date"
              min={rentStart}
              value={rentEnd}
              onChange={(e) => setRentEnd(e.target.value)}
              className="w-full bg-black/30 border border-white/10 rounded px-2 py-1.5 text-xs text-ink"
            />
            <div className="flex gap-2 mt-1">
              <button onClick={handleConfirmRent} className="flex-1 py-2 rounded bg-ink text-stage text-xs font-bold hover:bg-ink/90 transition">
                대여 확정
              </button>
              <button onClick={() => setPickingRentDate(false)} className="flex-1 py-2 rounded bg-white/10 text-ink text-xs font-semibold hover:bg-white/15 transition">
                취소
              </button>
            </div>
          </div>
        ) : (
          <button
            onClick={() => setPickingRentDate(true)}
            className="mt-4 px-5 py-2.5 rounded-full text-sm font-bold bg-ink text-stage hover:bg-ink/90 transition active:scale-95"
          >
            대여하기
          </button>
        )}
      </div>
    </div>
  );
}

/* ----------------------------------------------------------------
   Cloudinary 연동 — 이미지/영상 파일을 선택하면 자동으로 업로드되어 영구 링크가 생깁니다.
   (base64로 시트에 직접 넣으면 셀 글자수 제한(약 5만자)을 넘어 저장이 실패할 수 있어
   이미지도 영상과 마찬가지로 Cloudinary에 올리고 짧은 링크만 저장합니다)
------------------------------------------------------------------- */
const CLOUDINARY_CLOUD_NAME = 'ombmg03p';
const CLOUDINARY_UPLOAD_PRESET = 'n0lhfk54';

async function uploadToCloudinary_(file, resourceType) {
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/${resourceType}/upload`, {
    method: 'POST',
    body: formData,
  });
  if (!res.ok) {
    const errText = await res.text().catch(() => '');
    throw new Error(`업로드 실패 (HTTP ${res.status}) ${errText}`);
  }
  const data = await res.json();
  if (!data.secure_url) throw new Error('업로드 응답에 파일 주소가 없습니다.');
  return data.secure_url;
}

async function uploadImageToCloudinary(file) {
  return uploadToCloudinary_(file, 'image');
}

async function uploadVideoToCloudinary(file) {
  return uploadToCloudinary_(file, 'video');
}

/* ----------------------------------------------------------------
   화면 3: 소품 등록 — 사용자가 직접 이미지/영상 클립을 넣어 소품 추가
------------------------------------------------------------------- */
function RegisterScreen({ onAddProp, sheetUrl, syncing }) {
  const blank = {
    code: '', name: '', category: '', film: '', condition: '양호', donor: '',
    caption: '', imageFileUrl: '', imageLinkUrl: '', videoFileUrl: '', videoLinkUrl: '',
  };
  const [form, setForm] = useState(blank);
  const [imgFileName, setImgFileName] = useState('');
  const [vidFileName, setVidFileName] = useState('');
  const [imageUploading, setImageUploading] = useState(false);
  const [imageUploadError, setImageUploadError] = useState('');
  const [videoUploading, setVideoUploading] = useState(false);
  const [videoUploadError, setVideoUploadError] = useState('');

  const set = (key) => (e) => setForm(prev => ({ ...prev, [key]: e.target.value }));

  const handleImageFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setImgFileName(file.name);
    setImageUploadError('');
    setImageUploading(true);
    try {
      const secureUrl = await uploadImageToCloudinary(file);
      setForm(prev => ({ ...prev, imageFileUrl: secureUrl }));
    } catch (err) {
      setImageUploadError(err.message || '이미지 업로드에 실패했습니다.');
      setForm(prev => ({ ...prev, imageFileUrl: '' }));
    } finally {
      setImageUploading(false);
    }
  };

  const handleVideoFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setVidFileName(file.name);
    setVideoUploadError('');
    setVideoUploading(true);
    try {
      const secureUrl = await uploadVideoToCloudinary(file);
      setForm(prev => ({ ...prev, videoFileUrl: secureUrl }));
    } catch (err) {
      setVideoUploadError(err.message || '영상 업로드에 실패했습니다.');
      setForm(prev => ({ ...prev, videoFileUrl: '' }));
    } finally {
      setVideoUploading(false);
    }
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!form.name.trim()) { alert('소품 이름을 입력해주세요.'); return; }
    if (videoUploading) { alert('영상 업로드가 끝날 때까지 잠시만 기다려주세요.'); return; }
    if (imageUploading) { alert('이미지 업로드가 끝날 때까지 잠시만 기다려주세요.'); return; }
    const newProp = {
      id: Date.now(),
      code: form.code.trim() || `PS-${String(Math.floor(1000 + Math.random() * 9000))}`,
      name: form.name.trim(),
      category: form.category.trim() || '기타 소품',
      film: form.film.trim() || '-',
      condition: form.condition,
      donor: form.donor.trim() || '-',
      gradient: ['#3a352f', '#6b625a'], // 이미지가 없을 때만 쓰이는 기본 플레이스홀더 색
      caption: form.caption.trim(),
      priorityReservedBy: null,
      priorityStartDate: null,
      priorityEndDate: null,
      generalRentedBy: null,
      generalStartDate: null,
      generalEndDate: null,
      imageUrl: form.imageLinkUrl.trim() || form.imageFileUrl || null,
      videoUrl: form.videoLinkUrl.trim() || form.videoFileUrl || null,
    };
    onAddProp(newProp);
    setForm(blank);
    setImgFileName('');
    setVidFileName('');
    setVideoUploadError('');
  };

  return (
    <div className="max-w-3xl mx-auto px-4 sm:px-6 pb-16">
      <div className="pt-8 pb-6 border-b border-white/10 mb-6">
        <p className="font-mono text-xs text-amber tracking-widest mb-1">ADD_YOUR_PROP</p>
        <h2 className="font-display text-4xl tracking-wide">내 소품 직접 등록하기</h2>
        <p className="text-sm text-muted mt-1">사진과 영상 클립을 올려서 카탈로그/숏폼 피드에 바로 추가하세요.{sheetUrl && ' 저장 시 구글시트에도 함께 기록됩니다.'}</p>
      </div>

      <form onSubmit={handleSubmit} className="bg-surface border border-white/10 rounded-lg p-5 flex flex-col gap-4">
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label className="text-xs text-muted font-mono">소품 이름 *</label>
            <input value={form.name} onChange={set('name')} className="mt-1 w-full bg-stage border border-white/10 rounded px-3 py-2 text-sm" placeholder="예: 낡은 가죽 채찍" />
          </div>
          <div>
            <label className="text-xs text-muted font-mono">관리 코드 (선택)</label>
            <input value={form.code} onChange={set('code')} className="mt-1 w-full bg-stage border border-white/10 rounded px-3 py-2 text-sm font-mono" placeholder="자동 생성됨" />
          </div>
          <div>
            <label className="text-xs text-muted font-mono">카테고리</label>
            <input value={form.category} onChange={set('category')} className="mt-1 w-full bg-stage border border-white/10 rounded px-3 py-2 text-sm" placeholder="예: SF 소품" />
          </div>
          <div>
            <label className="text-xs text-muted font-mono">사용 작품명</label>
            <input value={form.film} onChange={set('film')} className="mt-1 w-full bg-stage border border-white/10 rounded px-3 py-2 text-sm" placeholder="예: 《네온 시티 2099》" />
          </div>
          <div>
            <label className="text-xs text-muted font-mono">상태</label>
            <select value={form.condition} onChange={set('condition')} className="mt-1 w-full bg-stage border border-white/10 rounded px-3 py-2 text-sm">
              <option>매우 양호</option><option>양호</option><option>보통</option><option>손상 있음</option>
            </select>
          </div>
          <div>
            <label className="text-xs text-muted font-mono">제공처</label>
            <input value={form.donor} onChange={set('donor')} className="mt-1 w-full bg-stage border border-white/10 rounded px-3 py-2 text-sm" placeholder="예: 만석 스튜디오" />
          </div>
        </div>

        <div>
          <label className="text-xs text-muted font-mono">소개 캡션</label>
          <textarea value={form.caption} onChange={set('caption')} rows={2} className="mt-1 w-full bg-stage border border-white/10 rounded px-3 py-2 text-sm" placeholder="소품에 대한 짧은 설명" />
        </div>

        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-2 border-t border-white/10">
          <div>
            <label className="text-xs text-amber font-mono">소품 이미지</label>
            <input type="file" accept="image/*" onChange={handleImageFile} disabled={imageUploading} className="mt-1 w-full text-xs text-muted file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:bg-amber file:text-stage file:text-xs file:font-bold disabled:opacity-50" />
            {imageUploading && <p className="text-[11px] text-amber mt-1">⏳ 이미지 업로드 중...</p>}
            {!imageUploading && imgFileName && form.imageFileUrl && <p className="text-[11px] text-olive mt-1">✅ 업로드 완료: {imgFileName}</p>}
            {!imageUploading && imageUploadError && <p className="text-[11px] text-red-400 mt-1">❌ {imageUploadError}</p>}
            <p className="text-[11px] text-muted mt-1">또는 이미지 URL 직접 입력:</p>
            <input value={form.imageLinkUrl} onChange={set('imageLinkUrl')} className="mt-1 w-full bg-stage border border-white/10 rounded px-3 py-2 text-xs" placeholder="https://..." />
          </div>
          <div>
            <label className="text-xs text-amber font-mono">소품 영상 클립</label>
            <input type="file" accept="video/*" onChange={handleVideoFile} disabled={videoUploading} className="mt-1 w-full text-xs text-muted file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:bg-amber file:text-stage file:text-xs file:font-bold disabled:opacity-50" />
            {videoUploading && <p className="text-[11px] text-amber mt-1">⏳ 영상 업로드 중... (파일 크기에 따라 시간이 걸릴 수 있어요)</p>}
            {!videoUploading && vidFileName && form.videoFileUrl && <p className="text-[11px] text-olive mt-1">✅ 업로드 완료: {vidFileName}</p>}
            {!videoUploading && videoUploadError && <p className="text-[11px] text-red-400 mt-1">❌ {videoUploadError}</p>}
            <p className="text-[11px] text-muted mt-1">또는 영상 URL 직접 입력 (유튜브/구글드라이브 등):</p>
            <input value={form.videoLinkUrl} onChange={set('videoLinkUrl')} className="mt-1 w-full bg-stage border border-white/10 rounded px-3 py-2 text-xs" placeholder="mp4 직링크, 유튜브, 구글드라이브 공유링크 등" />
          </div>
        </div>

        <button type="submit" disabled={syncing || videoUploading || imageUploading} className="mt-2 w-full py-3 rounded bg-amber text-stage font-bold hover:bg-amber/90 active:scale-[0.99] transition disabled:opacity-50">
          {imageUploading ? '이미지 업로드 대기 중...' : videoUploading ? '영상 업로드 대기 중...' : syncing ? '저장 중...' : '소품 추가하기'}
        </button>
      </form>
    </div>
  );
}

/* ----------------------------------------------------------------
   구글시트 연동 설정 모달
------------------------------------------------------------------- */
function SettingsModal({ open, onClose, sheetUrl, setSheetUrl, onLoadFromSheet, onExportAll, syncing }) {
  const [draft, setDraft] = useState(sheetUrl);
  useEffect(() => { setDraft(sheetUrl); }, [open, sheetUrl]);
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center px-4" onClick={onClose}>
      <div className="bg-surface border border-white/10 rounded-lg p-5 w-full max-w-md" onClick={e => e.stopPropagation()}>
        <h3 className="font-display text-2xl tracking-wide mb-1">구글시트 연동</h3>
        <p className="text-xs text-muted mb-3">sheetdb.io에서 발급받은 API 주소를 붙여넣으세요.</p>
        <input
          value={draft}
          onChange={e => setDraft(e.target.value)}
          placeholder="https://sheetdb.io/api/v1/xxxxxxxxxxxx"
          className="w-full bg-stage border border-white/10 rounded px-3 py-2 text-xs font-mono"
        />
        <div className="flex gap-2 mt-4">
          <button onClick={() => setSheetUrl(draft)} className="flex-1 py-2 rounded bg-olive text-stage text-sm font-bold">저장</button>
          <button onClick={onClose} className="flex-1 py-2 rounded bg-white/10 text-ink text-sm font-bold">닫기</button>
        </div>
        <div className="flex gap-2 mt-2">
          <button disabled={!sheetUrl || syncing} onClick={onLoadFromSheet} className="flex-1 py-2 rounded border border-white/20 text-ink text-xs font-semibold disabled:opacity-40">
            시트에서 불러오기
          </button>
          <button disabled={!sheetUrl || syncing} onClick={onExportAll} className="flex-1 py-2 rounded border border-white/20 text-ink text-xs font-semibold disabled:opacity-40">
            현재 목록 시트로 내보내기
          </button>
        </div>
      </div>
    </div>
  );
}

/* ----------------------------------------------------------------
   APP — 상단 탭으로 화면 전환 + 전역 상태(예약 목록) 공유
------------------------------------------------------------------- */
function App() {
  const [tab, setTab] = useState('catalog'); // 'catalog' | 'feed' | 'register'
  const [props, setProps] = useState(initialProps);
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);

  // 구글시트 연동 상태 — localStorage에 저장해서 새로고침해도 URL이 유지되도록 함
  const SHEET_URL_KEY = 'propinsight_sheet_url';
  const [sheetUrl, setSheetUrlState] = useState(() => {
    try {
      const saved = localStorage.getItem(SHEET_URL_KEY);
      return saved || DEFAULT_SHEET_URL;
    } catch (e) { return DEFAULT_SHEET_URL; }
  });
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [syncing, setSyncing] = useState(false);

  const setSheetUrl = (url) => {
    setSheetUrlState(url);
    try {
      if (url) localStorage.setItem(SHEET_URL_KEY, url);
      else localStorage.removeItem(SHEET_URL_KEY);
    } catch (e) { /* localStorage 사용 불가 환경이면 조용히 무시 */ }
    showToast(url ? '구글시트 웹앱 URL이 저장되었습니다.' : '구글시트 연동이 해제되었습니다.', 'success');
  };

  // 신규 소품 등록 (등록 화면에서 호출) — 로컬 목록에 추가 + 시트 연동 시 자동 업서트
  const handleAddProp = async (newProp) => {
    setProps(prev => [newProp, ...prev]);
    setInteractions(prev => ({ ...prev, [newProp.id]: { liked: false, saved: false, likeCount: 0 } }));
    if (sheetUrl) {
      setSyncing(true);
      try {
        await sheetAddOrUpdate(sheetUrl, newProp);
        showToast(`'${newProp.name}' 소품이 추가되고 구글시트에도 저장되었습니다.`, 'success');
      } catch (err) {
        showToast(`목록에는 추가되었지만 시트 저장에 실패했습니다: ${err.message}`, 'block');
      } finally {
        setSyncing(false);
      }
    } else {
      showToast(`'${newProp.name}' 소품이 추가되었습니다.`, 'success');
    }
    setTab('catalog');
  };

  const handleLoadFromSheet = async () => {
    setSyncing(true);
    try {
      const loaded = await sheetGetAll(sheetUrl);
      setProps(loaded);
      showToast(`구글시트에서 소품 ${loaded.length}건을 불러왔습니다.`, 'success');
      setSettingsOpen(false);
    } catch (err) {
      showToast(`불러오기 실패: ${err.message}`, 'block');
    } finally {
      setSyncing(false);
    }
  };

  const handleExportAll = async () => {
    setSyncing(true);
    try {
      await sheetExportAll(sheetUrl, props);
      showToast('현재 소품 목록을 구글시트로 내보냈습니다.', 'success');
      setSettingsOpen(false);
    } catch (err) {
      showToast(`내보내기 실패: ${err.message}`, 'block');
    } finally {
      setSyncing(false);
    }
  };

  // 새로고침 시 시트 URL이 저장되어 있으면 자동으로 최신 소품 목록을 불러옴
  useEffect(() => {
    if (sheetUrl) {
      handleLoadFromSheet();
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const [interactions, setInteractions] = useState(() => {
    const init = {};
    initialProps.forEach(p => {
      init[p.id] = { liked: false, saved: false, likeCount: 120 + p.id * 37 };
    });
    return init;
  });

  const showToast = (message, type = 'info') => {
    if (toastTimer.current) clearTimeout(toastTimer.current);
    setToast({ message, type });
    toastTimer.current = setTimeout(() => setToast(null), 2600);
  };

  // 독립영화팀 화면: 우선 예약 처리 (촬영 시작일 최소 10일 전 신청, 여러 날 촬영 기간 지원)
  // -> 기존에 일반 사용자가 대여 중이었다면 그 대여를 취소하고 우선예약으로 전환합니다.
  const handleReserve = (id, startDate, endDate) => {
    let overrodeGeneral = false;
    setProps(prev => prev.map(p => {
      if (p.id !== id) return p;
      if (p.generalRentedBy) overrodeGeneral = true;
      return {
        ...p,
        priorityReservedBy: '인디 감독 · 나 (지금 예약)',
        priorityStartDate: startDate,
        priorityEndDate: endDate,
        generalRentedBy: null, // 우선예약이 일반 대여를 덮어씀
        generalStartDate: null,
        generalEndDate: null,
      };
    }));
    const period = endDate && endDate !== startDate ? `${startDate} ~ ${endDate}` : startDate;
    showToast(
      overrodeGeneral
        ? `우선 예약이 완료되었습니다 (촬영기간 ${period}). 기존 일반 대여는 취소되었습니다.`
        : `우선 예약이 완료되었습니다 (촬영기간 ${period}).`,
      'success'
    );
  };

  const handleCancelReserve = (id) => {
    setProps(prev => prev.map(p =>
      p.id === id ? { ...p, priorityReservedBy: null, priorityStartDate: null, priorityEndDate: null } : p
    ));
    showToast('우선 예약이 취소되었습니다.', 'success');
  };

  // 일반 사용자 화면: 대여는 언제나 신청 가능 (단, 이후 우선예약이 들어오면 취소될 수 있음)
  const handleRent = (prop, startDate, endDate) => {
    setProps(prev => prev.map(p =>
      p.id === prop.id
        ? { ...p, generalRentedBy: '일반 사용자 · 나', generalStartDate: startDate, generalEndDate: endDate }
        : p
    ));
    const period = endDate && endDate !== startDate ? `${startDate} ~ ${endDate}` : startDate;
    showToast(`'${prop.name}' 대여가 신청되었습니다 (${period}).`, 'success');
  };

  const handleCancelRent = (id) => {
    setProps(prev => prev.map(p =>
      p.id === id ? { ...p, generalRentedBy: null, generalStartDate: null, generalEndDate: null } : p
    ));
    showToast('대여가 취소되었습니다.', 'success');
  };

  const toggleLike = (id) => setInteractions(prev => {
    const cur = prev[id];
    const liked = !cur.liked;
    return { ...prev, [id]: { ...cur, liked, likeCount: cur.likeCount + (liked ? 1 : -1) } };
  });
  const toggleSave = (id) => setInteractions(prev => ({ ...prev, [id]: { ...prev[id], saved: !prev[id].saved } }));
  const handleShare = () => showToast('공유 링크가 복사되었습니다.', 'success');

  return (
    <div className="min-h-screen flex flex-col">
      {/* 헤더 */}
      <header className="sticky top-0 z-40 bg-stage/95 backdrop-blur border-b border-white/10">
        <div className="clapper-stripe h-1.5 w-full opacity-70"></div>
        <div className="max-w-6xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between">
          <div className="flex items-center gap-2 sm:gap-2.5 min-w-0">
            <div className="shrink-0 scale-90 sm:scale-100 origin-left">
              <Icon.Clapper />
            </div>
            <div className="min-w-0">
              <h1 className="font-display text-xl sm:text-2xl tracking-widest leading-none truncate">PROPINSIGHT</h1>
              <p className="hidden sm:block text-[10px] text-muted font-mono tracking-wide">소품 대여 &amp; 데이터 수집 플랫폼</p>
            </div>
          </div>

          {/* 데스크톱 전용 상단 네비게이션 — 모바일은 화면 하단 탭바 사용 */}
          <div className="hidden sm:flex items-center gap-2">
            <nav className="flex items-center gap-1 bg-surface rounded-full p-1 border border-white/10">
              <button
                onClick={() => setTab('catalog')}
                className={`px-4 py-2 rounded-full text-sm font-semibold transition ${tab === 'catalog' ? 'bg-amber text-stage' : 'text-muted hover:text-ink'}`}
              >
                인디 카탈로그
              </button>
              <button
                onClick={() => setTab('feed')}
                className={`px-4 py-2 rounded-full text-sm font-semibold transition ${tab === 'feed' ? 'bg-amber text-stage' : 'text-muted hover:text-ink'}`}
              >
                숏폼 피드
              </button>
              <button
                onClick={() => setTab('register')}
                className={`px-4 py-2 rounded-full text-sm font-semibold transition ${tab === 'register' ? 'bg-amber text-stage' : 'text-muted hover:text-ink'}`}
              >
                소품 등록
              </button>
            </nav>
            <button
              onClick={() => setSettingsOpen(true)}
              title="구글시트 연동 설정"
              className={`w-9 h-9 rounded-full border flex items-center justify-center transition ${sheetUrl ? 'border-olive text-olive' : 'border-white/10 text-muted hover:text-ink'}`}
            >
              ⚙
            </button>
          </div>

          {/* 모바일: 설정 버튼만 헤더에 남기고 나머지는 하단 탭바로 */}
          <button
            onClick={() => setSettingsOpen(true)}
            title="구글시트 연동 설정"
            className={`sm:hidden w-9 h-9 shrink-0 rounded-full border flex items-center justify-center transition ${sheetUrl ? 'border-olive text-olive' : 'border-white/10 text-muted hover:text-ink'}`}
          >
            ⚙
          </button>
        </div>
      </header>

      {/* 본문 */}
      <main className={`flex-1 ${tab === 'feed' ? '' : 'pb-20 sm:pb-0'}`}>
        {tab === 'catalog' && <CatalogScreen props={props} onReserve={handleReserve} onCancelReserve={handleCancelReserve} />}
        {tab === 'feed' && (
          <FeedScreen
            props={props}
            interactions={interactions}
            onLike={toggleLike}
            onSave={toggleSave}
            onShare={handleShare}
            onRent={handleRent}
            onCancelRent={handleCancelRent}
          />
        )}
        {tab === 'register' && (
          <RegisterScreen onAddProp={handleAddProp} sheetUrl={sheetUrl} syncing={syncing} />
        )}
      </main>

      {/* 모바일 전용 하단 탭바 */}
      <nav className="sm:hidden fixed bottom-0 inset-x-0 z-40 bg-stage/95 backdrop-blur border-t border-white/10 flex pb-[env(safe-area-inset-bottom)]">
        <button
          onClick={() => setTab('catalog')}
          className={`flex-1 flex flex-col items-center justify-center gap-0.5 py-2.5 text-[11px] font-semibold transition ${tab === 'catalog' ? 'text-amber' : 'text-muted'}`}
        >
          <span className="text-base leading-none">🎬</span>
          인디 카탈로그
        </button>
        <button
          onClick={() => setTab('feed')}
          className={`flex-1 flex flex-col items-center justify-center gap-0.5 py-2.5 text-[11px] font-semibold transition ${tab === 'feed' ? 'text-amber' : 'text-muted'}`}
        >
          <span className="text-base leading-none">▶</span>
          숏폼 피드
        </button>
        <button
          onClick={() => setTab('register')}
          className={`flex-1 flex flex-col items-center justify-center gap-0.5 py-2.5 text-[11px] font-semibold transition ${tab === 'register' ? 'text-amber' : 'text-muted'}`}
        >
          <span className="text-base leading-none">＋</span>
          소품 등록
        </button>
      </nav>

      <SettingsModal
        open={settingsOpen}
        onClose={() => setSettingsOpen(false)}
        sheetUrl={sheetUrl}
        setSheetUrl={setSheetUrl}
        onLoadFromSheet={handleLoadFromSheet}
        onExportAll={handleExportAll}
        syncing={syncing}
      />

      <Toast toast={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

    }).code;
    var script = document.createElement('script');
    script.textContent = output;
    document.body.appendChild(script);
