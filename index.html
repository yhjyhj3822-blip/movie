/* ----------------------------------------------------------------
   GOOGLE SHEETS 연동 유틸
   - 구글시트를 DB처럼 쓰기 위해 "Google Apps Script 웹앱"을 백엔드로 사용합니다.
   - 이 파일과 함께 제공되는 Code.gs 를 구글 시트의 Apps Script 편집기에 붙여넣고
     "웹 앱으로 배포"한 뒤, 발급되는 URL을 화면 우측 상단 ⚙ 설정에 붙여넣으면 됩니다.
   - ⚠ Apps Script 웹앱은 내부적으로 리다이렉트(302)가 일어나는데, 이 리다이렉트 응답에는
     CORS 허용 헤더가 없어서 fetch()로 "응답을 읽으려는" 시도가 브라우저에서 막힙니다.
     그래서:
       읽기(GET, 목록 불러오기) → CORS를 타지 않는 JSONP(<script> 태그) 방식으로 우회
       쓰기(POST, 등록/내보내기) → 숨겨진 <form> 제출 방식으로 우회 (fetch가 아니라
       실제 브라우저 폼 전송이라 CORS 자체가 적용되지 않고, 서버에 확실히 도달합니다)
------------------------------------------------------------------- */
function sheetGetAll(webAppUrl) {
  return new Promise((resolve, reject) => {
    if (!webAppUrl) { reject(new Error('구글시트 웹앱 URL이 설정되지 않았습니다.')); return; }
    const callbackName = 'propInsightCb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
    const script = document.createElement('script');
    let timeoutId;

    const cleanup = () => {
      clearTimeout(timeoutId);
      delete window[callbackName];
      script.remove();
    };

    window[callbackName] = (data) => {
      cleanup();
      if (!Array.isArray(data)) { reject(new Error('시트 응답 형식이 올바르지 않습니다.')); return; }
      resolve(data);
    };

    script.onerror = () => { cleanup(); reject(new Error('시트 불러오기 요청 실패 (URL을 다시 확인해주세요)')); };
    timeoutId = setTimeout(() => { cleanup(); reject(new Error('시트 응답 시간이 초과되었습니다.')); }, 15000);

    const sep = webAppUrl.includes('?') ? '&' : '?';
    script.src = `${webAppUrl}${sep}action=list&callback=${callbackName}`;
    document.body.appendChild(script);
  });
}

/** 숨겨진 iframe + form 제출로 구글 앱스스크립트에 POST — CORS를 타지 않아 확실히 서버에 도달합니다. */
function sheetPostViaForm(webAppUrl, payload) {
  return new Promise((resolve, reject) => {
    if (!webAppUrl) { reject(new Error('구글시트 웹앱 URL이 설정되지 않았습니다.')); return; }

    const uniq = 'propInsightFrame_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
    const iframe = document.createElement('iframe');
    iframe.name = uniq;
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    const form = document.createElement('form');
    form.action = webAppUrl;
    form.method = 'POST';
    form.target = uniq;
    form.style.display = 'none';

    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'payload';
    input.value = JSON.stringify(payload);
    form.appendChild(input);
    document.body.appendChild(form);

    // 폼 제출은 응답 내용을 읽을 수 없으므로(다른 출처 iframe), 일정 시간 후
    // "요청은 보냈다"고 간주하고 정리합니다. 실제 반영 여부는 시트에서 확인하세요.
    const cleanup = () => { form.remove(); iframe.remove(); };
    try {
      form.submit();
    } catch (err) {
      cleanup();
      reject(err);
      return;
    }
    setTimeout(() => { cleanup(); resolve({ ok: true }); }, 1200);
  });
}

async function sheetAddOrUpdate(webAppUrl, prop) {
  return sheetPostViaForm(webAppUrl, { action: 'upsert', prop });
}

async function sheetExportAll(webAppUrl, propsList) {
  return sheetPostViaForm(webAppUrl, { action: 'replaceAll', props: propsList });
}

/* ----------------------------------------------------------------
   TOAST — 대여 차단/성공 알림
------------------------------------------------------------------- */
function Toast({ toast }) {
  if (!toast) return null;
  const tone = toast.type === 'block'
    ? 'bg-rust/95 border-rust'
    : 'bg-olive/95 border-olive';
  return (
    <div className={`fixed bottom-24 sm:bottom-8 left-1/2 toast-anim z-50 px-5 py-3 rounded-lg border ${tone} shadow-xl max-w-sm text-center`}>
      <p className="text-sm font-semibold text-ink">{toast.message}</p>
    </div>
  );
}

/* ----------------------------------------------------------------
   인벤토리 태그 카드 (카탈로그 화면의 시그니처 컴포넌트)
------------------------------------------------------------------- */
function PropTag({ prop, onReserve }) {
  const reserved = prop.isPriority;
  return (
    <div className={`relative rounded-md bg-surface border ${reserved ? 'border-rust/60' : 'border-white/10'} overflow-hidden flex flex-col shadow-lg`}>

      {/* 펀치홀 + 코드 라벨 */}
      <div className="flex items-center justify-between px-3 pt-3">
        <div className="tag-hole"></div>
        <span className="font-mono text-[11px] tracking-widest text-muted">{prop.code}</span>
      </div>

      {/* 사진 영역: 업로드된 이미지가 있으면 표시, 없으면 플레이스홀더 그라디언트 */}
      <div
        className="relative mt-2 mx-3 h-36 rounded overflow-hidden flex items-end"
        style={!prop.imageUrl ? { backgroundImage: `linear-gradient(155deg, ${(prop.gradient || ['#3a352f','#6b625a'])[0]}, ${(prop.gradient || ['#3a352f','#6b625a'])[1]})` } : undefined}
      >
        {prop.imageUrl && (
          <img src={prop.imageUrl} alt={prop.name} className="absolute inset-0 w-full h-full object-cover" />
        )}
        <span className="relative text-[10px] font-mono text-ink/70 bg-black/30 px-2 py-0.5 m-2 rounded">{prop.category}</span>

        {reserved && (
          <div className="absolute inset-0 flex items-center justify-center bg-stage/40">
            <div className="stamp px-3 py-1 text-xs font-bold uppercase bg-stage/70 rounded">
              예약 완료
            </div>
          </div>
        )}
      </div>

      {/* 정보 */}
      <div className="px-4 pt-3 pb-4 flex flex-col gap-1 grow">
        <h3 className="font-display text-2xl leading-none tracking-wide">{prop.name}</h3>
        <p className="text-xs text-muted">{prop.film} · 상태 {prop.condition}</p>
        <p className="text-xs text-muted/80 mt-1 line-clamp-2">{prop.caption}</p>

        <div className="mt-3 flex items-center justify-between gap-2">
          {reserved ? (
            <div className="w-full">
              <button disabled className="w-full py-2 rounded bg-white/5 text-muted text-sm font-semibold cursor-not-allowed border border-white/10">
                예약됨 · 촬영 대여 중
              </button>
              <p className="text-[11px] text-rust mt-1 text-center">{prop.reservedBy}</p>
            </div>
          ) : (
            <button
              onClick={() => onReserve(prop.id)}
              className="w-full py-2 rounded bg-amber text-stage text-sm font-bold hover:bg-amber/90 active:scale-[0.99] transition"
            >
              우선 예약 신청
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

------------------------------------------------------------------- */
function FeedSlide({ prop, interaction, onLike, onSave, onShare, onRent }) {
  return (
    <div className="feed-slide relative h-full w-full shrink-0 flex items-end justify-start"
      style={!prop.videoUrl && !prop.imageUrl ? { backgroundImage: `linear-gradient(200deg, ${(prop.gradient || ['#3a352f','#6b625a'])[0]}, ${(prop.gradient || ['#3a352f','#6b625a'])[1]})` } : undefined}
    >
      {/* 업로드된 영상 클립이 있으면 우선 재생, 없고 이미지가 있으면 이미지, 둘 다 없으면 그라디언트 플레이스홀더 */}
      {prop.videoUrl ? (
        <video
          className="absolute inset-0 w-full h-full object-cover"
          src={prop.videoUrl}
          autoPlay
          loop
          muted
          playsInline
        />
      ) : prop.imageUrl ? (
        <img src={prop.imageUrl} alt={prop.name} className="absolute inset-0 w-full h-full object-cover" />
      ) : null}

      {/* 하단 가독성용 그라디언트 */}
      <div className="absolute inset-0 bg-gradient-to-t from-stage/90 via-stage/10 to-transparent"></div>

      {/* 예약됨 뱃지 */}
      {prop.isPriority && (
        <div className="absolute top-4 left-4 stamp px-2 py-0.5 text-[10px] font-bold bg-stage/70 rounded">
          촬영 대여중
        </div>
      )}
      <div className="absolute top-4 right-4 font-mono text-[10px] text-ink/60">{prop.code}</div>

      {/* 우측 하단 인터랙션 스택 */}
      <div className="absolute right-3 bottom-28 sm:bottom-24 flex flex-col items-center gap-5 z-10">
        <button onClick={() => onLike(prop.id)} className="flex flex-col items-center gap-1 active:scale-90 transition">
          <Icon.Heart filled={interaction.liked} />
          <span className="text-[11px] font-mono">{interaction.likeCount}</span>
        </button>
        <button onClick={() => onSave(prop.id)} className="flex flex-col items-center gap-1 active:scale-90 transition">
          <Icon.Bookmark filled={interaction.saved} />
          <span className="text-[11px] font-mono">저장</span>
        </button>
        <button onClick={() => onShare(prop.id)} className="flex flex-col items-center gap-1 active:scale-90 transition">
          <Icon.Share />
          <span className="text-[11px] font-mono">공유</span>
        </button>
      </div>

      {/* 좌하단 캡션 + 대여 버튼 */}
      <div className="relative z-10 px-5 pb-8 pr-20 w-full">
        <p className="text-xs text-amber font-mono tracking-wide mb-1">{prop.category} · {prop.film}</p>
        <h3 className="font-display text-3xl tracking-wide">{prop.name}</h3>
        <p className="text-sm text-ink/80 mt-1 max-w-md">{prop.caption}</p>

        <button
          onClick={() => onRent(prop)}
          className={`mt-4 px-5 py-2.5 rounded-full text-sm font-bold transition active:scale-95 ${
            prop.isPriority
              ? 'bg-white/10 text-muted border border-white/20 cursor-not-allowed'
              : 'bg-ink text-stage hover:bg-ink/90'
          }`}
        >

  );

/* ----------------------------------------------------------------
   화면 3: 소품 등록 — 사용자가 직접 이미지/영상 클립을 넣어 소품 추가
------------------------------------------------------------------- */
function RegisterScreen({ onAddProp, sheetUrl, syncing }) {
  const blank = {
    code: '', name: '', category: '', film: '', condition: '양호', donor: '',
    caption: '', imageFileUrl: '', imageLinkUrl: '', videoFileUrl: '', videoLinkUrl: '',
  };
  const [form, setForm] = useState(blank);
  const [imgFileName, setImgFileName] = useState('');
  const [vidFileName, setVidFileName] = useState('');

  const set = (key) => (e) => setForm(prev => ({ ...prev, [key]: e.target.value }));

  const handleImageFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setImgFileName(file.name);
    const reader = new FileReader();
    reader.onload = () => setForm(prev => ({ ...prev, imageFileUrl: reader.result }));
    reader.readAsDataURL(file); // 이미지는 용량이 작아 base64로 바로 저장 가능
  };

  const handleVideoFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setVidFileName(file.name);
    // 영상은 용량이 커서 base64 대신 브라우저 임시 재생 URL(blob)만 만듭니다.
    // 이 blob URL은 "지금 이 탭을 새로고침하기 전까지"만 재생됩니다.
    // 새로고침 후에도 유지하려면 아래 "영상 링크" 칸에 유튜브/구글드라이브/자체 서버 등에
    // 업로드한 영상의 URL을 붙여넣어 주세요.
    const url = URL.createObjectURL(file);
    setForm(prev => ({ ...prev, videoFileUrl: url }));
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!form.name.trim()) { alert('소품 이름을 입력해주세요.'); return; }
    const newProp = {
      id: Date.now(),
      code: form.code.trim() || `PS-${String(Math.floor(1000 + Math.random() * 9000))}`,
      name: form.name.trim(),
      category: form.category.trim() || '기타 소품',
      film: form.film.trim() || '-',
      condition: form.condition,
      donor: form.donor.trim() || '-',
      gradient: ['#3a352f', '#6b625a'], // 이미지가 없을 때만 쓰이는 기본 플레이스홀더 색
      caption: form.caption.trim(),
      isPriority: false,
      reservedBy: null,
      imageUrl: form.imageLinkUrl.trim() || form.imageFileUrl || null,
      videoUrl: form.videoLinkUrl.trim() || form.videoFileUrl || null,
    };
    onAddProp(newProp);
    setForm(blank);
    setImgFileName('');
    setVidFileName('');
  };

  return (
    <div className="max-w-3xl mx-auto px-4 sm:px-6 pb-16">
      <div className="pt-8 pb-6 border-b border-white/10 mb-6">
        <p className="font-mono text-xs text-amber tracking-widest mb-1">ADD_YOUR_PROP</p>
        <h2 className="font-display text-4xl tracking-wide">내 소품 직접 등록하기</h2>
        <p className="text-sm text-muted mt-1">사진과 영상 클립을 올려서 카탈로그/숏폼 피드에 바로 추가하세요.{sheetUrl && ' 저장 시 구글시트에도 함께 기록됩니다.'}</p>
      </div>

      <form onSubmit={handleSubmit} className="bg-surface border border-white/10 rounded-lg p-5 flex flex-col gap-4">
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label className="text-xs text-muted font-mono">소품 이름 *</label>
            <input value={form.name} onChange={set('name')} className="mt-1 w-full bg-stage border border-white/10 rounded px-3 py-2 text-sm" placeholder="예: 낡은 가죽 채찍" />
          </div>
          <div>
            <label className="text-xs text-muted font-mono">관리 코드 (선택)</label>
            <input value={form.code} onChange={set('code')} className="mt-1 w-full bg-stage border border-white/10 rounded px-3 py-2 text-sm font-mono" placeholder="자동 생성됨" />
          </div>
          <div>
            <label className="text-xs text-muted font-mono">카테고리</label>
            <input value={form.category} onChange={set('category')} className="mt-1 w-full bg-stage border border-white/10 rounded px-3 py-2 text-sm" placeholder="예: SF 소품" />
          </div>
          <div>
            <label className="text-xs text-muted font-mono">사용 작품명</label>
            <input value={form.film} onChange={set('film')} className="mt-1 w-full bg-stage border border-white/10 rounded px-3 py-2 text-sm" placeholder="예: 《네온 시티 2099》" />
          </div>
          <div>
            <label className="text-xs text-muted font-mono">상태</label>
            <select value={form.condition} onChange={set('condition')} className="mt-1 w-full bg-stage border border-white/10 rounded px-3 py-2 text-sm">
              <option>매우 양호</option><option>양호</option><option>보통</option><option>손상 있음</option>
            </select>
          </div>
          <div>
            <label className="text-xs text-muted font-mono">제공처</label>
            <input value={form.donor} onChange={set('donor')} className="mt-1 w-full bg-stage border border-white/10 rounded px-3 py-2 text-sm" placeholder="예: 만석 스튜디오" />
          </div>
        </div>

        <div>
          <label className="text-xs text-muted font-mono">소개 캡션</label>
          <textarea value={form.caption} onChange={set('caption')} rows={2} className="mt-1 w-full bg-stage border border-white/10 rounded px-3 py-2 text-sm" placeholder="소품에 대한 짧은 설명" />
        </div>

        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-2 border-t border-white/10">
          <div>
            <label className="text-xs text-amber font-mono">소품 이미지</label>
            <input type="file" accept="image/*" onChange={handleImageFile} className="mt-1 w-full text-xs text-muted file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:bg-amber file:text-stage file:text-xs file:font-bold" />
            {imgFileName && <p className="text-[11px] text-olive mt-1">첨부됨: {imgFileName}</p>}
            <p className="text-[11px] text-muted mt-1">또는 이미지 URL 직접 입력:</p>
            <input value={form.imageLinkUrl} onChange={set('imageLinkUrl')} className="mt-1 w-full bg-stage border border-white/10 rounded px-3 py-2 text-xs" placeholder="https://..." />
          </div>
          <div>
            <label className="text-xs text-amber font-mono">소품 영상 클립</label>
            <input type="file" accept="video/*" onChange={handleVideoFile} className="mt-1 w-full text-xs text-muted file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:bg-amber file:text-stage file:text-xs file:font-bold" />
            {vidFileName && <p className="text-[11px] text-olive mt-1">첨부됨: {vidFileName} (새로고침 전까지만 재생됨)</p>}
            <p className="text-[11px] text-muted mt-1">영구 저장하려면 영상 URL을 입력하세요 (권장):</p>
            <input value={form.videoLinkUrl} onChange={set('videoLinkUrl')} className="mt-1 w-full bg-stage border border-white/10 rounded px-3 py-2 text-xs" placeholder="mp4 직링크, 구글드라이브 공유링크 등" />
          </div>
        </div>

        <button type="submit" disabled={syncing} className="mt-2 w-full py-3 rounded bg-amber text-stage font-bold hover:bg-amber/90 active:scale-[0.99] transition disabled:opacity-50">
          {syncing ? '저장 중...' : '소품 추가하기'}
        </button>
      </form>
    </div>
  );
}

/* ----------------------------------------------------------------
   구글시트 연동 설정 모달
------------------------------------------------------------------- */
function SettingsModal({ open, onClose, sheetUrl, setSheetUrl, onLoadFromSheet, onExportAll, syncing }) {
  const [draft, setDraft] = useState(sheetUrl);
  useEffect(() => { setDraft(sheetUrl); }, [open, sheetUrl]);
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center px-4" onClick={onClose}>
      <div className="bg-surface border border-white/10 rounded-lg p-5 w-full max-w-md" onClick={e => e.stopPropagation()}>
        <h3 className="font-display text-2xl tracking-wide mb-1">구글시트 연동</h3>
        <p className="text-xs text-muted mb-3">Apps Script 웹앱으로 배포한 URL을 붙여넣으세요. (함께 제공된 Code.gs 참고)</p>
        <input
          value={draft}
          onChange={e => setDraft(e.target.value)}
          placeholder="https://script.google.com/macros/s/.../exec"
          className="w-full bg-stage border border-white/10 rounded px-3 py-2 text-xs font-mono"
        />
        <div className="flex gap-2 mt-4">
          <button onClick={() => setSheetUrl(draft)} className="flex-1 py-2 rounded bg-olive text-stage text-sm font-bold">저장</button>
          <button onClick={onClose} className="flex-1 py-2 rounded bg-white/10 text-ink text-sm font-bold">닫기</button>
        </div>
        <div className="flex gap-2 mt-2">
          <button disabled={!sheetUrl || syncing} onClick={onLoadFromSheet} className="flex-1 py-2 rounded border border-white/20 text-ink text-xs font-semibold disabled:opacity-40">
            시트에서 불러오기
          </button>
          <button disabled={!sheetUrl || syncing} onClick={onExportAll} className="flex-1 py-2 rounded border border-white/20 text-ink text-xs font-semibold disabled:opacity-40">
            현재 목록 시트로 내보내기
          </button>
        </div>
      </div>
    </div>
  );
}

/* ----------------------------------------------------------------
   APP — 상단 탭으로 화면 전환 + 전역 상태(예약 목록) 공유
------------------------------------------------------------------- */
function App() {
  const [tab, setTab] = useState('catalog'); // 'catalog' | 'feed' | 'register'
  const [props, setProps] = useState(initialProps);
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);

  // 구글시트 연동 상태 — localStorage에 저장해서 새로고침해도 URL이 유지되도록 함
  const SHEET_URL_KEY = 'propinsight_sheet_url';
  const [sheetUrl, setSheetUrlState] = useState(() => {
    try {
      const saved = localStorage.getItem(SHEET_URL_KEY);
      return saved || DEFAULT_SHEET_URL;
    } catch (e) { return DEFAULT_SHEET_URL; }
  });
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [syncing, setSyncing] = useState(false);

  const setSheetUrl = (url) => {
    setSheetUrlState(url);
    try {
      if (url) localStorage.setItem(SHEET_URL_KEY, url);
      else localStorage.removeItem(SHEET_URL_KEY);
    } catch (e) { /* localStorage 사용 불가 환경이면 조용히 무시 */ }
    showToast(url ? '구글시트 웹앱 URL이 저장되었습니다.' : '구글시트 연동이 해제되었습니다.', 'success');
  };

  // 신규 소품 등록 (등록 화면에서 호출) — 로컬 목록에 추가 + 시트 연동 시 자동 업서트
  const handleAddProp = async (newProp) => {
    setProps(prev => [newProp, ...prev]);
    setInteractions(prev => ({ ...prev, [newProp.id]: { liked: false, saved: false, likeCount: 0 } }));
    if (sheetUrl) {
      setSyncing(true);
      try {
        await sheetAddOrUpdate(sheetUrl, newProp);
        showToast(`'${newProp.name}' 소품이 추가되고 구글시트에도 저장되었습니다.`, 'success');
      } catch (err) {
        showToast(`목록에는 추가되었지만 시트 저장에 실패했습니다: ${err.message}`, 'block');
      } finally {
        setSyncing(false);
      }
    } else {
      showToast(`'${newProp.name}' 소품이 추가되었습니다.`, 'success');
    }
    setTab('catalog');
  };

  const handleLoadFromSheet = async () => {
    setSyncing(true);
    try {
      const loaded = await sheetGetAll(sheetUrl);
      setProps(loaded);
      showToast(`구글시트에서 소품 ${loaded.length}건을 불러왔습니다.`, 'success');
      setSettingsOpen(false);
    } catch (err) {
      showToast(`불러오기 실패: ${err.message}`, 'block');
    } finally {
      setSyncing(false);
    }
  };

  const handleExportAll = async () => {
    setSyncing(true);
    try {
      await sheetExportAll(sheetUrl, props);
      showToast('현재 소품 목록을 구글시트로 내보냈습니다.', 'success');
      setSettingsOpen(false);
    } catch (err) {
      showToast(`내보내기 실패: ${err.message}`, 'block');
    } finally {
      setSyncing(false);
    }
  };

  // 새로고침 시 시트 URL이 저장되어 있으면 자동으로 최신 소품 목록을 불러옴
  useEffect(() => {
    if (sheetUrl) {
      handleLoadFromSheet();
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const [interactions, setInteractions] = useState(() => {
    const init = {};
    initialProps.forEach(p => {
      init[p.id] = { liked: false, saved: false, likeCount: 120 + p.id * 37 };
    });
    return init;
  });

  const showToast = (message, type = 'info') => {
    if (toastTimer.current) clearTimeout(toastTimer.current);
    setToast({ message, type });
    toastTimer.current = setTimeout(() => setToast(null), 2600);
  };

  // 독립영화팀 화면: 우선 예약 처리 -> 전역 상태 갱신 (숏폼 화면에 실시간 반영)
  const handleReserve = (id) => {
    setProps(prev => prev.map(p =>
      p.id === id ? { ...p, isPriority: true, reservedBy: '인디 감독 · 나 (지금 예약)' } : p
    ));
    showToast('우선 예약이 완료되었습니다. 일반 사용자 화면에서 즉시 대여가 차단됩니다.', 'success');
  };

  // 일반 사용자 화면: 대여 신청 -> 우선예약 여부 확인 후 차단/성공 분기
  const handleRent = (prop) => {
    if (prop.isPriority) {
      showToast('현재 독립영화 촬영을 위해 대여 중입니다.', 'block');
    } else {
      showToast(`'${prop.name}' 대여 신청이 접수되었습니다.`, 'success');
    }
  };

  const toggleLike = (id) => setInteractions(prev => {
    const cur = prev[id];
    const liked = !cur.liked;
    return { ...prev, [id]: { ...cur, liked, likeCount: cur.likeCount + (liked ? 1 : -1) } };
  });
  const toggleSave = (id) => setInteractions(prev => ({ ...prev, [id]: { ...prev[id], saved: !prev[id].saved } }));
  const handleShare = () => showToast('공유 링크가 복사되었습니다.', 'success');

  return (
    <div className="min-h-screen flex flex-col">
      {/* 헤더 */}
      <header className="sticky top-0 z-40 bg-stage/95 backdrop-blur border-b border-white/10">
        <div className="clapper-stripe h-1.5 w-full opacity-70"></div>
        <div className="max-w-6xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between">
          <div className="flex items-center gap-2 sm:gap-2.5 min-w-0">
            <div className="shrink-0 scale-90 sm:scale-100 origin-left">
              <Icon.Clapper />
            </div>
            <div className="min-w-0">
              <h1 className="font-display text-xl sm:text-2xl tracking-widest leading-none truncate">PROPINSIGHT</h1>
              <p className="hidden sm:block text-[10px] text-muted font-mono tracking-wide">소품 대여 &amp; 데이터 수집 플랫폼</p>
            </div>
          </div>

          {/* 데스크톱 전용 상단 네비게이션 — 모바일은 화면 하단 탭바 사용 */}
          <div className="hidden sm:flex items-center gap-2">
            <nav className="flex items-center gap-1 bg-surface rounded-full p-1 border border-white/10">
              <button
                onClick={() => setTab('catalog')}
                className={`px-4 py-2 rounded-full text-sm font-semibold transition ${tab === 'catalog' ? 'bg-amber text-stage' : 'text-muted hover:text-ink'}`}
              >
                인디 카탈로그
              </button>
              <button
                onClick={() => setTab('feed')}
                className={`px-4 py-2 rounded-full text-sm font-semibold transition ${tab === 'feed' ? 'bg-amber text-stage' : 'text-muted hover:text-ink'}`}
              >
                숏폼 피드
              </button>
              <button
                onClick={() => setTab('register')}
                className={`px-4 py-2 rounded-full text-sm font-semibold transition ${tab === 'register' ? 'bg-amber text-stage' : 'text-muted hover:text-ink'}`}
              >
                소품 등록
              </button>
            </nav>
            <button
              onClick={() => setSettingsOpen(true)}
              title="구글시트 연동 설정"
              className={`w-9 h-9 rounded-full border flex items-center justify-center transition ${sheetUrl ? 'border-olive text-olive' : 'border-white/10 text-muted hover:text-ink'}`}
            >
              ⚙
            </button>
          </div>

          {/* 모바일: 설정 버튼만 헤더에 남기고 나머지는 하단 탭바로 */}
          <button
            onClick={() => setSettingsOpen(true)}
            title="구글시트 연동 설정"
            className={`sm:hidden w-9 h-9 shrink-0 rounded-full border flex items-center justify-center transition ${sheetUrl ? 'border-olive text-olive' : 'border-white/10 text-muted hover:text-ink'}`}
          >
            ⚙
          </button>
        </div>
      </header>

      {/* 본문 */}
      <main className="flex-1 pb-20 sm:pb-0">
        {tab === 'catalog' && <CatalogScreen props={props} onReserve={handleReserve} />}
        {tab === 'feed' && (
          <FeedScreen
            props={props}
            interactions={interactions}
            onLike={toggleLike}
            onSave={toggleSave}
            onShare={handleShare}
            onRent={handleRent}
          />
        )}
        {tab === 'register' && (
          <RegisterScreen onAddProp={handleAddProp} sheetUrl={sheetUrl} syncing={syncing} />
        )}
      </main>

      {/* 모바일 전용 하단 탭바 */}
      <nav className="sm:hidden fixed bottom-0 inset-x-0 z-40 bg-stage/95 backdrop-blur border-t border-white/10 flex pb-[env(safe-area-inset-bottom)]">
        <button
          onClick={() => setTab('catalog')}
          className={`flex-1 flex flex-col items-center justify-center gap-0.5 py-2.5 text-[11px] font-semibold transition ${tab === 'catalog' ? 'text-amber' : 'text-muted'}`}
        >
          <span className="text-base leading-none">🎬</span>
          인디 카탈로그
        </button>
        <button
          onClick={() => setTab('feed')}
          className={`flex-1 flex flex-col items-center justify-center gap-0.5 py-2.5 text-[11px] font-semibold transition ${tab === 'feed' ? 'text-amber' : 'text-muted'}`}
        >
          <span className="text-base leading-none">▶</span>
          숏폼 피드
        </button>
        <button
          onClick={() => setTab('register')}
          className={`flex-1 flex flex-col items-center justify-center gap-0.5 py-2.5 text-[11px] font-semibold transition ${tab === 'register' ? 'text-amber' : 'text-muted'}`}
        >
          <span className="text-base leading-none">＋</span>
          소품 등록
        </button>
      </nav>

      <SettingsModal
        open={settingsOpen}
        onClose={() => setSettingsOpen(false)}
        sheetUrl={sheetUrl}
        setSheetUrl={setSheetUrl}
        onLoadFromSheet={handleLoadFromSheet}
        onExportAll={handleExportAll}
        syncing={syncing}
      />

      <Toast toast={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
  (function () {
    var code = document.getElementById('app-source').textContent;
    var output = Babel.transform(code, {
      presets: [['react', { runtime: 'classic' }]],
      filename: 'app.jsx'
    }).code;
    var script = document.createElement('script');
    script.textContent = output;
    document.body.appendChild(script);
  })();
</script>
</body>
</html>
